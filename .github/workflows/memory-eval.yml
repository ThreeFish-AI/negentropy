name: Memory Eval Baseline

# Phase 4 — LoCoMo / LongMemEval 检索质量基线
# 触发条件：
# 1. PR 打 `memory-eval` 标签
# 2. 手动 workflow_dispatch
# 3. 每周一凌晨自动跑（与主 backend tests 错峰）

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: memory-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-eval:
    name: Memory Retrieval Eval Baseline
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'memory-eval')
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/negentropy/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run eval markers
        run: |
          mkdir -p ../../.temp/eval
          uv run pytest tests/eval_tests/memory -m eval -v --no-cov

      - name: Run baseline report
        run: |
          uv run python -m tests.eval_tests.memory.eval_runner \
            --out ../../.temp/eval/ci_baseline.md
          cat ../../.temp/eval/ci_baseline.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-eval-report
          path: .temp/eval/ci_baseline.md
          if-no-files-found: warn
          retention-days: 30
