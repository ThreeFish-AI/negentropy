name: Wiki Test Suite

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "apps/negentropy-wiki/**"
      - ".github/workflows/negentropy-wiki-tests.yml"
      - ".github/workflows/reusable-negentropy-wiki-quality.yml"
      - ".github/actions/setup-pnpm-wiki/**"
  pull_request:
    branches:
      - "**"
    paths:
      - "apps/negentropy-wiki/**"
      - ".github/workflows/negentropy-wiki-tests.yml"
      - ".github/workflows/reusable-negentropy-wiki-quality.yml"
      - ".github/actions/setup-pnpm-wiki/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wiki-quality:
    uses: ./.github/workflows/reusable-negentropy-wiki-quality.yml
