name: Reusable Backend QA

on:
  workflow_call:
    inputs:
      run_performance:
        description: "是否执行性能测试"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NE_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 单元测试经会话级 autouse fixture `_isolate_test_database`（tests/conftest.py，
    # ISSUE-111 数据安全防护）无条件 CREATE DATABASE + alembic upgrade head，需可达的
    # Postgres。沿用与 integration/performance 一致的 pgvector 服务（`CREATE EXTENSION
    # vector` 依赖该镜像）；fixture 自建并迁移 `test_db_test`，无需额外 init 步骤。
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - name: Start PostgreSQL (pgvector) with retry
        working-directory: .
        run: |
          IMAGE="pgvector/pgvector:pg16"
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Pulling ${IMAGE} (attempt ${i}/${MAX_ATTEMPTS})..."
            if docker pull "$IMAGE"; then
              echo "Pull succeeded."
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Failed to pull ${IMAGE} after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
            WAIT=$((i * 10))
            echo "Pull failed, retrying in ${WAIT}s..."
            sleep "$WAIT"
          done

          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=postgres \
            -p 5432:5432 \
            "$IMAGE"

          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres -q; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::PostgreSQL did not become ready in time"
          docker logs postgres
          exit 1

      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy
          frozen: "true"

      - name: Verify Alembic graph has a single head
        run: |
          uv run python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          config = Config("alembic.ini")
          script = ScriptDirectory.from_config(config)
          heads = script.get_heads()
          if len(heads) != 1:
              raise SystemExit(f"Expected a single Alembic head, got: {heads}")
          print(f"Alembic head: {heads[0]}")
          PY

      - name: Run unit tests with coverage gate
        run: |
          mkdir -p test-results
          uv run pytest tests/unit_tests/ \
            --cov=negentropy \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=test-results/unit.junit.xml

      - name: Upload backend unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-artifacts
          path: |
            apps/negentropy/coverage.xml
            apps/negentropy/htmlcov
            apps/negentropy/test-results/unit.junit.xml
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        run: |
          echo "## Backend Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Executed: \`uv run pytest tests/unit_tests/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage gate: \`fail_under=50\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: \`backend-unit-artifacts\`" >> "$GITHUB_STEP_SUMMARY"

  backend-integration:
    name: Backend Integration Tests
    needs: backend-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - name: Start PostgreSQL (pgvector) with retry
        working-directory: .
        run: |
          IMAGE="pgvector/pgvector:pg16"
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Pulling ${IMAGE} (attempt ${i}/${MAX_ATTEMPTS})..."
            if docker pull "$IMAGE"; then
              echo "Pull succeeded."
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Failed to pull ${IMAGE} after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
            WAIT=$((i * 10))
            echo "Pull failed, retrying in ${WAIT}s..."
            sleep "$WAIT"
          done

          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=postgres \
            -p 5432:5432 \
            "$IMAGE"

          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres -q; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::PostgreSQL did not become ready in time"
          docker logs postgres
          exit 1

      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy
          frozen: "true"

      - name: Initialize database schema
        run: |
          uv run python scripts/init_test_db.py
          uv run alembic upgrade head

      - name: Run integration tests
        run: |
          mkdir -p test-results
          uv run pytest tests/integration_tests/ -v --no-cov \
            --junitxml=test-results/integration.junit.xml

      - name: Upload backend integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-artifacts
          path: apps/negentropy/test-results/integration.junit.xml
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        run: |
          echo "## Backend Integration Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Executed database-backed integration suite." >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: \`backend-integration-artifacts\`" >> "$GITHUB_STEP_SUMMARY"

  backend-performance:
    name: Backend Performance Tests
    if: inputs.run_performance
    needs: backend-integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - name: Start PostgreSQL (pgvector) with retry
        working-directory: .
        run: |
          IMAGE="pgvector/pgvector:pg16"
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Pulling ${IMAGE} (attempt ${i}/${MAX_ATTEMPTS})..."
            if docker pull "$IMAGE"; then
              echo "Pull succeeded."
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Failed to pull ${IMAGE} after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
            WAIT=$((i * 10))
            echo "Pull failed, retrying in ${WAIT}s..."
            sleep "$WAIT"
          done

          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=postgres \
            -p 5432:5432 \
            "$IMAGE"

          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres -q; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::PostgreSQL did not become ready in time"
          docker logs postgres
          exit 1

      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy
          frozen: "true"

      - name: Initialize database schema
        run: |
          uv run python scripts/init_test_db.py
          uv run alembic upgrade head

      - name: Run performance tests
        run: |
          mkdir -p test-results
          uv run pytest tests/performance_tests/ -v --no-cov \
            --junitxml=test-results/performance.junit.xml

      - name: Upload backend performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-performance-artifacts
          path: apps/negentropy/test-results/performance.junit.xml
          if-no-files-found: error
          retention-days: 14
