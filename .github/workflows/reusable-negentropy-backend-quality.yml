name: Reusable Backend QA

on:
  workflow_call:
    inputs:
      run_performance:
        description: "是否执行性能测试"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NE_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/negentropy/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify Alembic graph has a single head
        run: |
          uv run python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          config = Config("alembic.ini")
          script = ScriptDirectory.from_config(config)
          heads = script.get_heads()
          if len(heads) != 1:
              raise SystemExit(f"Expected a single Alembic head, got: {heads}")
          print(f"Alembic head: {heads[0]}")
          PY

      - name: Run unit tests with coverage gate
        run: |
          mkdir -p test-results
          uv run pytest tests/unit_tests/ \
            --cov=negentropy \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=test-results/unit.junit.xml

      - name: Upload backend unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-artifacts
          path: |
            apps/negentropy/coverage.xml
            apps/negentropy/htmlcov
            apps/negentropy/test-results/unit.junit.xml
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        run: |
          echo "## Backend Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Executed: \`uv run pytest tests/unit_tests/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage gate: \`fail_under=50\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: \`backend-unit-artifacts\`" >> "$GITHUB_STEP_SUMMARY"

  backend-integration:
    name: Backend Integration Tests
    needs: backend-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/negentropy/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Initialize database schema
        run: |
          uv run python scripts/init_test_db.py
          uv run alembic upgrade head

      - name: Run integration tests
        run: |
          mkdir -p test-results
          uv run pytest tests/integration_tests/ -v \
            --junitxml=test-results/integration.junit.xml

      - name: Upload backend integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-artifacts
          path: apps/negentropy/test-results/integration.junit.xml
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        run: |
          echo "## Backend Integration Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Executed database-backed integration suite." >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: \`backend-integration-artifacts\`" >> "$GITHUB_STEP_SUMMARY"

  backend-performance:
    name: Backend Performance Tests
    if: inputs.run_performance
    needs: backend-integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
    defaults:
      run:
        working-directory: apps/negentropy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/negentropy/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Initialize database schema
        run: |
          uv run python scripts/init_test_db.py
          uv run alembic upgrade head

      - name: Run performance tests
        run: |
          mkdir -p test-results
          uv run pytest tests/performance_tests/ -v \
            --junitxml=test-results/performance.junit.xml

      - name: Upload backend performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-performance-artifacts
          path: apps/negentropy/test-results/performance.junit.xml
          if-no-files-found: error
          retention-days: 14
