name: UI Test Suite

on:
  push:
    # 仅默认分支直推触发；其余分支由下方 pull_request 承担 CI，避免同提交 push+PR 双触发。
    branches:
      - master
      - main
      - develop
    paths:
      - "apps/negentropy-ui/**"
      - ".github/workflows/negentropy-ui-tests.yml"
      - ".github/workflows/reusable-negentropy-ui-quality.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "apps/negentropy-ui/**"
      - ".github/workflows/negentropy-ui-tests.yml"
      - ".github/workflows/reusable-negentropy-ui-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-quality:
    uses: ./.github/workflows/reusable-negentropy-ui-quality.yml
    with:
      run_e2e: true
