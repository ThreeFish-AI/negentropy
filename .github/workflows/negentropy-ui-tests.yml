name: UI Test Suite

on:
  push:
    branches:
      - "**"
    paths:
      - "apps/negentropy-ui/**"
      - ".github/workflows/negentropy-ui-tests.yml"
      - ".github/workflows/reusable-negentropy-ui-quality.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "apps/negentropy-ui/**"
      - ".github/workflows/negentropy-ui-tests.yml"
      - ".github/workflows/reusable-negentropy-ui-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-quality:
    uses: ./.github/workflows/reusable-negentropy-ui-quality.yml
    with:
      run_e2e: true
