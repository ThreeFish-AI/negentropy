name: Backend Test Suite

on:
  push:
    branches:
      - "**"
    paths:
      - "apps/negentropy/**"
      - "apps/negentropy-ui/lib/adk.ts"
      - ".github/workflows/negentropy-backend-tests.yml"
      - ".github/workflows/reusable-negentropy-backend-quality.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "apps/negentropy/**"
      - "apps/negentropy-ui/lib/adk.ts"
      - ".github/workflows/negentropy-backend-tests.yml"
      - ".github/workflows/reusable-negentropy-backend-quality.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    uses: ./.github/workflows/reusable-negentropy-backend-quality.yml
    with:
      run_performance: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
