name: Reusable UI QA

on:
  workflow_call:
    inputs:
      run_e2e:
        description: "是否执行 Playwright 冒烟测试"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ui-lint:
    name: UI Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/negentropy-ui
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由根 package.json 的 packageManager 字段统一提供
      # （pnpm 官方推荐的「单一事实源」模式；避免 ERR_PNPM_BAD_PM_VERSION）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          # PR-1 后 pnpm-lock.yaml 已上提到 monorepo 根目录
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint app
        run: pnpm lint

  ui-typecheck:
    name: UI Type Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/negentropy-ui
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由根 package.json 的 packageManager 字段统一提供
      # （pnpm 官方推荐的「单一事实源」模式；避免 ERR_PNPM_BAD_PM_VERSION）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          # PR-1 后 pnpm-lock.yaml 已上提到 monorepo 根目录
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck app
        run: pnpm typecheck

      - name: Typecheck tests
        run: pnpm typecheck:test

  ui-unit-integration:
    name: UI Unit And Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/negentropy-ui
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由根 package.json 的 packageManager 字段统一提供
      # （pnpm 官方推荐的「单一事实源」模式；避免 ERR_PNPM_BAD_PM_VERSION）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          # PR-1 后 pnpm-lock.yaml 已上提到 monorepo 根目录
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload UI coverage
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: apps/negentropy-ui/coverage
          if-no-files-found: error
          retention-days: 14

  ui-build-smoke:
    name: UI Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/negentropy-ui
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由根 package.json 的 packageManager 字段统一提供
      # （pnpm 官方推荐的「单一事实源」模式；避免 ERR_PNPM_BAD_PM_VERSION）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          # PR-1 后 pnpm-lock.yaml 已上提到 monorepo 根目录
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

  ui-e2e-smoke:
    name: UI Playwright Smoke
    if: inputs.run_e2e
    needs: [ui-lint, ui-typecheck, ui-unit-integration, ui-build-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/negentropy-ui
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由根 package.json 的 packageManager 字段统一提供
      # （pnpm 官方推荐的「单一事实源」模式；避免 ERR_PNPM_BAD_PM_VERSION）
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          # PR-1 后 pnpm-lock.yaml 已上提到 monorepo 根目录
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/negentropy-ui/playwright-report
            apps/negentropy-ui/tests/e2e/*-snapshots/
          if-no-files-found: warn
          retention-days: 14
