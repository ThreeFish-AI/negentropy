name: Dependency Review Guard

on:
  pull_request:
    paths:
      - "apps/negentropy/pyproject.toml"
      - "apps/negentropy/uv.lock"
      - "apps/negentropy-ui/package.json"
      - "apps/negentropy-ui/pnpm-lock.yaml"
      - ".github/workflows/negentropy-dependency-review.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency delta
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
