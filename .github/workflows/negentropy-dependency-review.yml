name: Dependency Review Guard

on:
  pull_request:
    paths:
      - "apps/negentropy/pyproject.toml"
      - "apps/negentropy/uv.lock"
      - "apps/negentropy-ui/package.json"
      - "apps/negentropy-wiki/package.json"
      - "packages/**/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/negentropy-dependency-review.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency delta
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
