name: Perceives CI

on:
  push:
    branches: [master, main, develop, "feature/**"]
    paths:
      - "apps/negentropy-perceives/**"
      - ".github/workflows/negentropy-perceives-ci.yml"
      - ".github/actions/setup-python-uv/**"
  pull_request:
    branches: [master, main, develop, "feature/**"]
    paths:
      - "apps/negentropy-perceives/**"
      - ".github/workflows/negentropy-perceives-ci.yml"
      - ".github/actions/setup-python-uv/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# 该工作流同时被直接触发（push/PR）与被 release 经 workflow_call 调用；
# group 追加 event_name 后缀，隔离发布校验运行，避免重推 tag 时误取消在途校验。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/negentropy-perceives

jobs:
  # 动态矩阵：跨平台全量（ubuntu/windows/macos）仅在「合并闸口」事件触发——
  # PR / 默认分支(master,main,develop)推送 / 周期 / 手动 / workflow_call；
  # feature/** 等短分支推送仅跑 ubuntu（macOS 10×/Windows 2× 高成本），跨平台由 PR 保证。
  matrix-prep:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      os_matrix: ${{ steps.set.outputs.os_matrix }}
    steps:
      - name: Resolve OS matrix
        id: set
        shell: bash
        run: |
          event="${{ github.event_name }}"
          ref="${{ github.ref }}"
          full="false"
          if [[ "$event" == "pull_request" \
             || "$event" == "schedule" \
             || "$event" == "workflow_dispatch" \
             || "$event" == "workflow_call" ]]; then
            full="true"
          elif [[ "$event" == "push" ]]; then
            case "$ref" in
              refs/heads/master|refs/heads/main|refs/heads/develop) full="true" ;;
              *) full="false" ;;
            esac
          fi
          if [[ "$full" == "true" ]]; then
            echo 'os_matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os_matrix=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test on ${{ matrix.os }}
    needs: [matrix-prep]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix-prep.outputs.os_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy-perceives
          enable-cache: "true"

      # 合并原独立 coverage job：测试步骤直接产出 coverage（term/xml/html），
      # 仅在 ubuntu 腿上传 artifact + Codecov（ubuntu 恒在矩阵中，确保唯一上传，避免各 OS 重复）。
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short -n auto --timeout=300 -m "not slow" --cov=negentropy.perceives --cov-report=term --cov-report=xml --cov-report=html
        timeout-minutes: 20
        env:
          NEGENTROPY_PERCEIVES_ENABLE_JAVASCRIPT: "false"

      - name: Upload coverage reports
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: perceives-coverage-report
          path: |
            apps/negentropy-perceives/coverage.xml
            apps/negentropy-perceives/htmlcov/

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./apps/negentropy-perceives/coverage.xml
          flags: perceives-unittests
          name: perceives-codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy-perceives

      - name: Run ruff linting
        run: uv run ruff check src/negentropy/perceives/

      - name: Run ruff formatting check
        run: uv run ruff format --check src/negentropy/perceives/

      - name: Run mypy type checking
        run: uv run mypy src/negentropy/perceives/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy-perceives

      - name: Run bandit security scan
        run: |
          uv run bandit -r src/negentropy/perceives/ -f json -o bandit-report.json || true
          uv run bandit -r src/negentropy/perceives/

      - name: Run pip-audit vulnerability scan
        run: |
          uv run pip-audit --format=json --output=audit-report.json || true
          # 忽略列表：upstream 暂无修复版本，或修复版本受其它依赖硬锁制约。
          # 每条均已结合本项目威胁模型（仅加载第一方模型，不执行 convert/checkpoint 工具链）评估。
          ignore_args=(
            # pygments：暂无修复版本
            --ignore-vuln CVE-2026-4539

            # fastmcp 3.1.1：修复版本 3.2.0，待升级评估
            --ignore-vuln CVE-2025-64340
            --ignore-vuln CVE-2026-27124

            # litellm 1.80.0：修复版本 1.83.0 / 1.83.7，受 pydantic==2.12.5 硬锁制约
            --ignore-vuln CVE-2026-35029
            --ignore-vuln CVE-2026-35030
            --ignore-vuln GHSA-69x8-hrgq-fjj8
            --ignore-vuln CVE-2026-42271

            # joblib 1.5.3：仅在加载不可信缓存时触发反序列化；supplier 已 dispute，upstream 无 fix
            --ignore-vuln PYSEC-2024-277

            # pyjwt 2.12.1：弱加密取决于调用方密钥长度；supplier 已 dispute，upstream 无 fix
            --ignore-vuln PYSEC-2025-183

            # transformers 4.x Trainer 路径任意代码执行；本项目未使用 Trainer
            --ignore-vuln CVE-2026-1839

            # transformers 4.57.6 convert/checkpoint 路径 RCE；本项目仅加载已转换的第一方模型，
            # 不调用转换工具链；transformers 锁定 <5.0.0 受 marker-pdf / docling 兼容交集制约
            --ignore-vuln PYSEC-2025-211
            --ignore-vuln PYSEC-2025-212
            --ignore-vuln PYSEC-2025-213
            --ignore-vuln PYSEC-2025-214
            --ignore-vuln PYSEC-2025-215
            --ignore-vuln PYSEC-2025-216
            --ignore-vuln PYSEC-2025-217
            --ignore-vuln PYSEC-2025-218

            # torch 2.10.0 本地内存破坏 / DoS，需攻击者构造恶意 tensor / pt2 文件；
            # 本项目仅加载第一方模型 artifact，无不可信输入路径，upstream 暂无 fix
            --ignore-vuln PYSEC-2025-189
            --ignore-vuln PYSEC-2025-190
            --ignore-vuln PYSEC-2025-191
            --ignore-vuln PYSEC-2025-192
            --ignore-vuln PYSEC-2025-193
            --ignore-vuln PYSEC-2025-194
            --ignore-vuln PYSEC-2025-195
            --ignore-vuln PYSEC-2025-196
            --ignore-vuln PYSEC-2025-197
            --ignore-vuln PYSEC-2025-210
            --ignore-vuln PYSEC-2026-139

            # torch 2.10.0 CVE-2025-3000：本地内存破坏 / DoS，同上（需构造恶意 tensor；本项目仅加载第一方模型 artifact，upstream 暂无 fix）
            --ignore-vuln CVE-2025-3000
          )
          uv run pip-audit "${ignore_args[@]}"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perceives-security-reports
          path: |
            apps/negentropy-perceives/bandit-report.json
            apps/negentropy-perceives/audit-report.json

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          working-directory: apps/negentropy-perceives
          install-dev: "false"

      - name: Build package
        run: uv build

      - name: Test installation from wheel
        run: |
          uv pip install dist/*.whl
          uv run python -c "import negentropy.perceives; print(f'Successfully imported negentropy.perceives v{negentropy.perceives.__version__}')" || uv run python -c "import negentropy.perceives; print('Successfully imported negentropy.perceives')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perceives-dist-test
          path: apps/negentropy-perceives/dist/
          retention-days: 7
