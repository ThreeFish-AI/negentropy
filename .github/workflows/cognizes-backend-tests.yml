name: Cognizes Backend Test Suite

on:
  push:
    # 仅默认分支直推触发；其余分支由下方 pull_request 承担 CI，避免同提交 push+PR 双触发。
    branches: [master, main, develop]
    paths:
      - "apps/cognizes/**"
      - ".github/workflows/cognizes-backend-tests.yml"
      - ".github/workflows/reusable-cognizes-backend-quality.yml"
      - ".github/actions/setup-python-uv/**"
  pull_request:
    branches: ["**"]
    paths:
      - "apps/cognizes/**"
      - ".github/workflows/cognizes-backend-tests.yml"
      - ".github/workflows/reusable-cognizes-backend-quality.yml"
      - ".github/actions/setup-python-uv/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    uses: ./.github/workflows/reusable-cognizes-backend-quality.yml
    with:
      run_integration: ${{ github.event_name == 'workflow_dispatch' }}
