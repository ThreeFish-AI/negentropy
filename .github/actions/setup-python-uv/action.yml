name: Setup Python with uv
description: 安装 uv 包管理器、Python 运行时并同步项目依赖

inputs:
  python-version:
    description: Python 版本
    default: "3.13"
  install-dev:
    description: 是否安装开发依赖
    default: "true"
  enable-cache:
    description: 是否启用 uv 缓存
    default: "true"
  working-directory:
    description: 项目目录（相对于仓库根目录）
    default: "."

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: ${{ inputs.enable-cache == 'true' }}
        cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"

    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.install-dev }}" = "true" ]; then
          uv sync --group dev
        else
          uv sync
        fi
