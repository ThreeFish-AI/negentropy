name: Setup Yarn UI
description: 安装 Node.js、yarn 依赖（用于 cognizes-ui）

inputs:
  node-version:
    description: Node.js 版本
    default: "22"
  working-directory:
    description: 项目目录
    default: "apps/cognizes-ui"

runs:
  using: composite
  steps:
    - name: Enable Corepack and prepare yarn
      shell: bash
      run: |
        # 临时移除根 packageManager 字段，避免 Node 22 Corepack 因检测到 pnpm 而拒绝 yarn
        if [ -f package.json ]; then
          tmp=$(mktemp)
          jq 'del(.packageManager)' package.json > "$tmp" && mv "$tmp" package.json
        fi
        corepack enable && corepack prepare yarn@stable --activate

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "yarn"
        cache-dependency-path: "${{ inputs.working-directory }}/yarn.lock"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: yarn install --frozen-lockfile
