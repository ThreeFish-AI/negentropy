name: Setup uv Backend
description: 安装 Python 运行时、uv 包管理器并同步项目依赖

inputs:
  python-version:
    description: Python 版本
    default: "3.13"
  working-directory:
    description: 项目目录（相对于仓库根目录）
    default: "apps/negentropy"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync --frozen
