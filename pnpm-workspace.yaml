# pnpm Monorepo 根 workspace 配置
#
# 合并自原 apps/negentropy-ui/pnpm-workspace.yaml 与 apps/negentropy-wiki/pnpm-workspace.yaml
# 的 allowBuilds + overrides，并新增 catalog 锁定 AGUI 协议层与跨包共享运行时版本。
#
# 协议契约（@ag-ui/* / rxjs / zod）通过 catalog 统一锁版本，避免 ui 与 wiki 各自漂移
# 导致协议层运行时双实例化（rxjs Observable instanceof 失效是经典坑）。
#
# 详见：/Users/cm.huang/.claude/plans/system-instruction-you-are-working-hidden-knuth.md

packages:
  - apps/*
  # 注：apps/cognizes（与 apps/cognizes-ui）是独立项目（Agentic AI Papers），
  # 非 Negentropy 主栈组成部分 —— ./dev 与 docker-compose 均不启动它。
  # 仅因 pnpm workspace 单 store 共享而纳入匹配；如需运行 cognizes，请参阅其自身 README。
  - packages/*
  # E2E Travel Agent Demo 前端已从 workspace 解耦（独立 pnpm install），
  # 以消除 @copilotkit/runtime → @ai-sdk/provider-utils@3.0.25 受 CVE-2026-8769 影响的传递依赖链。
  # 如需运行示例：cd apps/cognizes/src/cognizes/examples/e2e_travel_agent/frontend/travel-agent-ui && pnpm install && pnpm dev

# 允许执行原生构建脚本（继承自 ui / wiki 旧 workspace 配置）
allowBuilds:
  # @scarf/scarf 为匿名使用统计上报工具（通过 postinstall 触发），出于隐私与安全考虑禁用其脚本
  '@scarf/scarf': false
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true

# 跨包统一锁定版本（catalog 模式）
# 注意：catalog 的 key 必须与 import 时的 specifier 一致；使用方式：
#   "dependencies": { "@ag-ui/client": "catalog:" }
catalog:
  '@ag-ui/client': 0.0.47
  '@ag-ui/core': 0.0.47
  '@ag-ui/encoder': 0.0.47
  rxjs: 7.8.1
  zod: 3.24.4

# 全局 overrides（合并自子级 workspace；包含安全 patch 与协议版本对齐）
overrides:
  '@ag-ui/client': 0.0.47
  '@ag-ui/core': 0.0.47
  flatted: '>=3.4.2'
  # jsdom@28.1.0 引用 undici/lib/handler/{wrap,unwrap}-handler.js，该路径在 undici@8 已删除；
  # 限制上限到 <8 以保持 jsdom 兼容性，同时保留 >=7.24.0 的安全补丁要求。
  # 等 jsdom 升级到 29+ 且生态稳定后可考虑放开。
  undici: '>=7.24.0 <8.0.0'
  dompurify: '>=3.4.9'      # mermaid 传递 (运行时); 7 个 medium 告警 fixed @3.4.9 (GHSA-x4vx 无补丁, 仅升版本基线)
  lodash-es: '>=4.18.1'
  picomatch: '>=4.0.4'
  follow-redirects: '>=1.16.0'
  postcss: '>=8.5.10'
  uuid: '>=14.0.0'
  # GHSA-x7hr-w5r2-h6wg: prismjs < 1.30.0 DOM clobbering（refractor@3.6.0 锁死 1.27.0，强制覆盖）
  prismjs: '>=1.30.0'
  # ── Dependabot 安全告警修复：传递依赖补丁地板（父包均无版本封顶，override 干净解析）──
  form-data: '>=4.0.6'        # axios 传递 (cognizes-ui 运行时, GHSA high)
  ws: '>=8.21.0'              # jsdom@27 传递 (cognizes-ui dev/test, GHSA high)
  js-yaml: '>=4.2.0'          # @eslint/eslintrc 传递 (dev, GHSA medium)
  '@babel/core': '>=7.29.6 <8.0.0'   # @vitejs/plugin-react/next/styled-jsx peer ^7.0.0; 限 <8 避免 Babel 8 大版本跳跃破坏兼容 (GHSA low)
  esbuild: '>=0.28.1'         # vite + tsup 传递 (dev, GHSA low)
