# ────────────────────────────────────────────────────────────
# Routine 预设模版 — 技术文档生成（Documentation Enhancement）
#
# 审批模式: first（仅首次审批）
# 命令门控: 无（纯 LLM-as-Judge 评估）
# 工程范式: 首次审批门控（first 模式）、纯 LLM 评审无命令门控、
#           Reflexion 跨迭代记忆、session 连续性
# ────────────────────────────────────────────────────────────

preset_id: documentation_enhancement
display_name: "技术文档生成"
description: >
  面向目标模块的方向确认式文档工程：阅读源码后产出包含模块概述、架构说明、
  API 参考、配置与扩展指引的结构化技术文档。
  采用 first 审批模式——仅首轮确认文档方向与范围，之后进入全自动迭代，
  兼顾人工把控与效率。由于文档质量难以由命令行工具客观验证，采用纯 LLM-as-Judge 评审，
  依赖 Reflexion 反思记忆在迭代间持续逼近高质量；轻量迭代护栏契合文档类任务节奏。
category: documentation
version: 1.0.0
features_showcase:
  - "方向确认 — first 审批，仅首轮确认方向与范围"
  - "纯 LLM-as-Judge — 无 Command Gate，AI 评审文档质量"
  - "Reflexion — 跨迭代反思记忆持续改进文档"
  - "会话连续性 — Claude Code 保持上下文"
  - "轻量迭代护栏 — 契合文档任务的迭代节奏"

title: "Documentation Enhancement"
goal: >
  为目标代码模块生成或更新完整的技术文档。执行以下步骤：

  1. 阅读目标模块的全部源代码，理解模块职责、公开 API 和内部架构；
  2. 生成结构化文档，包含以下章节：
     - 模块概述（职责定位、设计理念）
     - 架构说明（核心组件、数据流、依赖关系）
     - API 参考（公开函数/类的签名、参数、返回值、使用示例）
     - 配置说明（环境变量、配置项及其默认值）
     - 扩展指引（如何在该模块基础上扩展新功能）
  3. 文档语言与模块内既有注释保持一致（中文或英文）；
  4. 代码示例需可执行且与当前 API 签名一致；
  5. 将文档写入模块目录或项目 docs/ 下的合适位置。

  重要约束：文档内容需准确反映代码实际行为，不臆测或虚构不存在的功能。
acceptance_criteria: >
  1. 文档覆盖模块的全部公开 API（函数签名 + 参数说明 + 返回值 + 示例）；
  2. 包含架构说明章节（组件关系、数据流、依赖）；
  3. 代码示例可执行且与当前 API 签名一致；
  4. 文档语言与模块既有注释一致；
  5. 无虚构功能描述，所有描述均有代码对应；
  6. Markdown 格式规范（标题层级、代码块语法、链接有效）。
verification_command: null
max_iterations: 8
max_cost_usd: 2.0
success_score_threshold: 85
no_progress_patience: 4
approval_mode: first
config:
  permission_mode: auto
