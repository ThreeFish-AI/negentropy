# =============================================================================
# Negentropy Default Configuration
# =============================================================================
# 此文件包含所有配置项的默认值，随项目包分发，作为「单一事实源」。
#
# 用户自定义配置:
#   uv run negentropy init            # 拷贝到 ~/.negentropy/config.yaml
#   uv run negentropy -c my.yaml      # 使用自定义配置文件
#
# 优先级（从高到低）:
#   1. 环境变量（如 NE_DB_POOL_SIZE=20；嵌套键使用 __ 分隔，见下方说明）
#   2. config.local.yaml（cwd 下运行时配置，gitignored，存放机密与 per-deployment 覆盖）
#   3. CLI 指定 YAML（-c path 或 NE_CONFIG_PATH）
#   4. ~/.negentropy/config.yaml（用户级）
#   5. 本文件（项目默认）
#   6. 代码中的 Field defaults
#
# 嵌套路径覆盖（env_nested_delimiter="__"）:
#   NE_KNOWLEDGE_DEFAULT_EXTRACTOR_ROUTES__URL__PRIMARY__TIMEOUT_MS=90000
#
# 密钥类配置（SecretStr / 凭证）请通过环境变量或 config.local.yaml 设置，
# 切勿写入本 YAML 或提交至仓库。常用密钥环境变量清单:
#   - NE_AUTH_TOKEN_SECRET
#   - NE_AUTH_GOOGLE_CLIENT_SECRET
#   - NE_OBSERVABILITY_LANGFUSE_PUBLIC_KEY
#   - NE_OBSERVABILITY_LANGFUSE_SECRET_KEY
#   - NE_SEARCH_GOOGLE_API_KEY
#   - OPENAI_API_KEY / ANTHROPIC_API_KEY / GEMINI_API_KEY（LiteLLM 原生直读）
# =============================================================================

# --- YAML 锚点常量（DRY）---
# Pydantic Settings 以 extra="ignore" 忽略下划线前缀顶级键，此块仅用于 YAML 内部复用。
_constants:
  perceives_server:  &perceives_server  negentropy-perceives
  timeout_short_ms:  &timeout_short_ms  60000
  timeout_medium_ms: &timeout_medium_ms 120000
  timeout_long_ms:   &timeout_long_ms   3600000  # file_pdf 主：1h（大 PDF 经 auto_batch 多切片串行 + checkpoint 续传，旧值 300000 会令后端 MCP 在单本未跑完前即超时）
  timeout_xlong_ms:  &timeout_xlong_ms  7200000  # file_pdf 备(批量)：2h
  session_ttl_7d:    &session_ttl_7d    604800

# --- 运行环境 ---
environment:
  env: development                         # development | testing | staging | production

# --- 应用元数据 ---
app:
  name: negentropy

# --- 日志配置 ---
logging:
  level: INFO                              # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: console                          # console | json
  sinks: stdio                             # 逗号分隔: stdio | file | gcloud
  file_path: logs/negentropy.log
  gcloud_log_name: negentropy
  console_timestamp_format: "%Y-%m-%d %H:%M:%S"
  console_level_width: 8
  console_logger_width: 21
  console_separator: " | "
  service_name: backend

# --- 数据库配置 ---
database:
  # 本地开发 URL。生产部署通过 NE_DB_URL 或 config.local.yaml 覆盖。
  url: "postgresql+asyncpg://aigc:@localhost:5432/negentropy"
  pool_size: 5
  max_overflow: 10
  pool_recycle: 3600
  echo: false

# --- 可观测性配置 ---
observability:
  langfuse_host: "https://langfuse.automizely.me"
  langfuse_enabled: true
  # langfuse_public_key: 通过环境变量 NE_OBSERVABILITY_LANGFUSE_PUBLIC_KEY 设置
  # langfuse_secret_key: 通过环境变量 NE_OBSERVABILITY_LANGFUSE_SECRET_KEY 设置

# --- ADK 服务配置 ---
services:
  credential_backend: postgres              # inmemory | postgres | session
  memory_backend: postgres                  # inmemory | vertexai | postgres
  session_backend: postgres                 # inmemory | vertexai | database | postgres
  artifact_backend: postgres                # inmemory | postgres（制品持久化到 adk_artifacts 表）
  vertex_project_id: aftership-team-data    # VertexAI 项目 ID
  # vertex_location: null                  # VertexAI 区域
  # vertex_agent_engine_id: null           # VertexAI Agent Engine ID

# --- Auth / SSO 配置 ---
auth:
  enabled: true
  mode: optional                           # off | optional | strict
  # token_secret: 通过环境变量 NE_AUTH_TOKEN_SECRET 或 config.local.yaml 设置
  google_client_id: "424524901788-h16ev3a8f872r6qcc5ov407g6fttmptv.apps.googleusercontent.com"
  # google_client_secret: 通过环境变量 NE_AUTH_GOOGLE_CLIENT_SECRET 或 config.local.yaml 设置
  google_redirect_uri: "http://localhost:3292/auth/google/callback"
  google_scopes:
    - openid
    - email
    - profile
  cookie_name: ne_sso
  # cookie_domain: null
  cookie_secure: false                     # ⚠️ 生产必须为 true（要求 HTTPS）
  cookie_same_site: lax
  session_ttl_seconds: *session_ttl_7d     # 7 天
  state_ttl_seconds: 600
  allowed_domains: []
  allowed_emails: []
  admin_emails: ["threefish.ai@gmail.com", "cm.huang@aftership.com"]
  user_id_strategy: sub                    # sub | email
  default_redirect_path: "/"

# --- Web Search 配置 ---
search:
  provider: google                         # google | duckduckgo | bing
  # Google Programmable Search:
  #   API Key 获取: https://developers.google.com/custom-search/v1/introduction
  #   CX ID 获取:  https://programmablesearchengine.google.com/controlpanel/all
  #   免费配额:    100 queries/day，超额需在 Google Cloud Console 启用计费
  # google_api_key: 通过环境变量 NE_SEARCH_GOOGLE_API_KEY 或 config.local.yaml 设置
  google_cx_id: d5ee76f9215be4ee9
  max_retries: 3
  timeout_seconds: 10.0
  base_backoff_seconds: 1.0
  max_results: 10

# --- Memory 子系统高级特性配置（默认开箱即用）---
# F1 HippoRAG / F2 Reflexion / F3 Memify 6-step / F4 Presidio / Rocchio 反馈闭环均默认启用。
# 各特性自带运行时安全闸（如 HippoRAG 的 min_kg_associations 数据闸、Reflexion 的
# max_inflight_tasks 并发上限、Presidio 的 allow_engine_fallback 降级），可经
# NE_MEMORY_<SECTION>__<KEY> 环境变量按需关闭/调参。
# 详细契约见 docs/reference/cognizes/engine/025-the-memory-system.md §10.5、docs/reference/cognizes/engine/026-memory-whitepaper.md §4；
# 上手指引见 docs/concepts/user-guide/memory-basics.md。
memory:
  hipporag:                                  # F1 HippoRAG PPR-Boosted Hybrid
    enabled: true                             # 默认开箱；min_kg_associations 数据闸使其在 KG 稀疏时自休眠回退 Hybrid
    depth: 2
    alpha: 0.5
    rrf_k: 60
    timeout_ms: 120
    seed_top_k: 5
    seed_threshold: 0.75
    min_kg_associations: 100
    gray_users: []
  reflection:                                # F2 Reflexion Episodic Replay（默认开箱）
    enabled: true                            # 失败检索（irrelevant/harmful）触发反思生成 + Few-Shot 召回；并发硬上限防风暴
    dedup_window_days: 7
    dedup_cosine: 0.92
    daily_limit_per_user: 10
    fewshot_k: 2
    budget_ratio: 0.10
    min_intent_confidence: 0.55
    max_inflight_tasks: 8                    # 后台反思任务硬上限（防反馈风暴）
  consolidation:                             # F3 Memify Consolidation Pipeline
    legacy: false
    policy: fail_tolerant                     # serial | parallel | fail_tolerant；单步失败不中断全链
    timeout_per_step_ms: 30000
    steps:                                   # 6-step Memify 默认开箱（步骤间有数据依赖，禁 parallel）
      - fact_extract                         # LLM 事实提取（失败降级 PatternFactExtractor）
      - entity_normalization                 # 实体规范化（LLM，失败容忍）
      - topic_cluster                        # 主题聚类（纯向量计算）
      - dedup_merge                          # 近重复合并 + AGM 冲突消解
      - summarize                            # 用户画像摘要刷新（LLM，TTL 缓存）
      - auto_link                            # 关联网络自动建边
    cluster_eps: 0.15                        # TopicCluster 聚类余弦距离阈值
    merge_threshold: 0.90                    # DedupMerge 近重复 cosine 阈值
  pii:                                       # F4 Presidio 生产级 PII（默认开箱）
    engine: presidio                         # regex | presidio；presidio 提供 PERSON/LOCATION NER + 多语言
    policy: mark                             # mark | mask | anonymize（写入策略）
    languages: [en, zh]
    score_threshold: 0.6
    # gatekeeper 默认关闭：检索遮蔽需 viewer_role 角色，而 ADK tool_context.search_memory /
    # 内部 agent 路径暂无法透传角色（拿不到角色→按低权限被遮蔽）。能力已接线并测试，
    # 待 REST/工具链全量补齐角色透传后再默认开。需要时显式置 true（REST 路径已据鉴权用户生效）。
    gatekeeper_enabled: false                # 检索路径按角色对低权限用户脱敏含 PII 记忆
    acl_role_threshold: editor               # 低于 editor 的角色看到脱敏副本
    allow_engine_fallback: true              # 开箱优先：spaCy 模型缺失时降级回 regex 并写 ERROR（经 /memory/health 可观测），不阻断启动
    retrieval_policy: anonymize              # 检索遮蔽策略（低权限角色）：mask | anonymize
  relevance:                                 # Phase 6 G1 Rocchio 相关性反馈闭环
    enabled: true                            # 读侧应用预计算 relevance_weight；写侧由 cron 重加权（默认开箱）
    rocchio_beta: 0.75                       # 正反馈系数 β
    rocchio_gamma: 0.15                      # 负反馈系数 γ
    prf_top_k: 3
    prf_alpha: 0.7
    feedback_min_count: 3                    # 最低反馈条数门槛
    reweight_interval_seconds: 3600
  retrieval:                                 # 主链路记忆检索（交互式对话 Preload 自动注入）
    preload_enabled: true                    # root Agent 每轮以用户 query 自动检索并注入 <RELEVANT_MEMORIES>
    preload_top_k: 5                         # 注入记忆条数上限
    preload_max_chars: 4000                  # 注入块字符预算（约 1-2K tokens）

# --- Routine 配置（长周期自主任务迭代执行：Evaluator-Optimizer + Reflexion）---
routine:
  enabled: true                              # Routine 编排循环已启用：routine_inspector 心跳驱动 Evaluate-Dispatch 闭环
  capture_events: true                       # 捕获并持久化迭代「全过程」动作级审计事件（工具调用/结果/评估）+ SSE 实时推送
  inspector_interval_seconds: 25             # 心跳 tick 间隔；与种子 routine_inspector ScheduledTask 一致
  max_concurrent_executions: 2               # 全局并发 Claude Code 执行上限（进程内信号量）
  lease_slack_seconds: 60                    # Runner lease 宽裕量；崩溃恢复 reaper 据此判定孤儿迭代
  gate_timeout_seconds: 120                  # verification_command 命令门控执行超时
  max_reflections_injected: 5                # 注入下一迭代 prompt 的最近反思条数（Reflexion 窗口）
  eval_failure_patience: 3                   # 评估器连续失败容忍次数，超过终止为 unrecoverable_error
  context_reset_max: 10                       # CC 会话上下文耗尽自动重置 session 冷启动上限；超过落回 unrecoverable（0=关闭自愈）
  default_max_iterations: 20                 # 创建 routine 默认迭代硬上限
  default_max_cost_usd: 5.0                  # 创建 routine 默认成本熔断（USD）
  max_events_per_iter: 5000                  # 单迭代动作事件捕获上限（Full View 审计）
  evaluator_model: null                      # LLM-as-Judge 模型覆盖；null 走 task_registry 的 routine.evaluate
  # 隔离 worktree（基于基线分支的隔离工作区 + 自动 PR 回基线）
  worktree_root: null                        # worktree 根目录；null → 运行期解析为仓库同级 <project_parent>/.negentropy-worktrees
  worktree_cleanup: on_success               # 终态回收策略：on_success（成功即清、失败保留）| always | never
  git_remote: origin                         # fetch / PR base 归一所用 git 远端名
  git_fetch_before_worktree: true            # 建 worktree 前 best-effort git fetch（带超时，失败不阻断）
  git_timeout_seconds: 120                   # 单条 git 子命令执行超时（秒）
  # --- pdf-fidelity-patrol 巡检（#978）---
  # 部署期默认开启：enabled 的种子任务真正每 1h 派生 Routine（routine.enabled 已 true）。
  # 缺凭证/可解析仓库/已转换 PDF 文档时，Routine 创建后失败或 handler 跳过，原因写入
  # task_executions.metrics.reason 并在 Scheduler UI 醒目展示（不 silent ok）。
  patrol_enabled: true                       # 巡检总开关（与 routine.enabled 同范式；Field 默认 False，YAML 覆盖为 true）
  patrol_repo_local_path: null               # null → 运行期从 negentropy 包路径自动推导仓库根；不可解析时报 repo_not_configured
  patrol_baseline_branch: "origin/feature/1.x.x"
  patrol_input_dir: "/tmp/negentropy-patrol"  # 源 PDF 暂存 + 候选 Markdown 输出根
  patrol_max_iterations_per_doc: 8           # 单文档巡检 Routine 迭代硬上限
  patrol_max_cost_usd_per_doc: 30.0          # 单文档成本熔断（USD）；重自治任务单轮约 $3-4，30 容许 ~8 轮收敛（原 5 致 2 轮撞顶）
  patrol_regression_sample_size: 6           # 非回归基线样本数

# --- Knowledge 配置 ---
knowledge:
  max_file_size_mb: 200                   # 文件上传大小上限 (MB)
  # Wiki SSG ISR 主动 revalidate webhook：publish/unpublish 完成后向 SSG 通知立即重渲染。
  # 未配置 url → 退化为「被动 ISR」（SSG 自身 5 分钟窗口刷新），不阻塞发布主链路。
  # secret 通过环境变量 NE_KNOWLEDGE_WIKI_REVALIDATE__SECRET 注入（生产必填，本地可空）。
  wiki_revalidate:
    url: http://localhost:3092/api/revalidate
    timeout_seconds: 5.0
  default_extractor_routes:
    url:
      primary:
        server_name: *perceives_server
        tool_name: parse_webpage_to_markdown
        enabled: true
        timeout_ms: *timeout_short_ms
      secondary:
        server_name: *perceives_server
        tool_name: parse_webpages_to_markdown
        enabled: true
        timeout_ms: *timeout_medium_ms
    file_pdf:
      primary:
        server_name: *perceives_server
        tool_name: parse_pdf_to_markdown
        enabled: true
        timeout_ms: *timeout_long_ms
      secondary:
        server_name: *perceives_server
        tool_name: parse_pdfs_to_markdown
        enabled: true
        timeout_ms: *timeout_xlong_ms

