# .pre-commit-config.yaml
#
# 本地开发 pre-commit 钩子：在每次 git commit 前自动运行 format 和 lint，
# 将格式/Lint 缺陷拦截在本地，避免浪费 CI/CD 资源。
#
# 安装方式（仅需执行一次）：
#   uv tool install pre-commit
#   pre-commit install
#
# 手动运行全量检查：
#   pre-commit run --all-files

default_language_version:
  python: python3.13

default_install_hook_types: [pre-commit]

repos:
  # ── 通用文件检查 ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0  # pre-commit framework v5 尚未发布，暂用 v4 系列最新
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  # ── Python: apps/negentropy ──────────────────────────────────────────────
  # 使用官方 ruff-pre-commit 集成（版本与 pyproject.toml 中 ruff>=0.14.14 对齐）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      # 1. Lint：自动修复可修复项，有修复时以非零码退出（提示重新 git add）
      - id: ruff
        name: ruff lint (negentropy)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/negentropy/
        types_or: [python, pyi]
      # 2. Format：统一代码风格（双引号、空格缩进、行宽 120）
      - id: ruff-format
        name: ruff format (negentropy)
        files: ^apps/negentropy/
        types_or: [python, pyi]

  # ── Node.js: apps/negentropy-ui ──────────────────────────────────────────
  # ESLint v9 flat config（eslint.config.mjs），零警告策略（--max-warnings=0）
  - repo: local
    hooks:
      - id: negentropy-ui-eslint
        name: ESLint (negentropy-ui)
        language: system
        # pass_filenames: false —— ESLint 自行管理文件范围，避免框架传入文件名导致路径错误
        entry: bash -c 'cd apps/negentropy-ui && pnpm lint'
        files: ^apps/negentropy-ui/.*\.(js|jsx|ts|tsx|mjs|cjs)$
        pass_filenames: false

  # ── Node.js: apps/negentropy-wiki ────────────────────────────────────────
  # next lint（Next.js 15 内置 ESLint 集成，eslint.config.mjs flat config）
  - repo: local
    hooks:
      - id: negentropy-wiki-eslint
        name: next lint (negentropy-wiki)
        language: system
        entry: bash -c 'cd apps/negentropy-wiki && pnpm lint'
        files: ^apps/negentropy-wiki/.*\.(js|jsx|ts|tsx|mjs|cjs)$
        pass_filenames: false

  # ── Python: apps/negentropy-perceives ────────────────────────────────────
  # 使用 local hooks（uv run），与 CI 流水线行为一致
  # perceives 的 ruff 版本 (>=0.15.10) 与 negentropy (0.14.14) 不同，独立配置
  - repo: local
    hooks:
      - id: perceives-ruff-format
        name: ruff format (negentropy-perceives)
        language: system
        entry: bash -c 'cd apps/negentropy-perceives && uv run ruff format'
        files: ^apps/negentropy-perceives/
        types_or: [python, pyi]
      - id: perceives-ruff-lint
        name: ruff lint (negentropy-perceives)
        language: system
        entry: bash -c 'cd apps/negentropy-perceives && uv run ruff check --fix --exit-non-zero-on-fix'
        files: ^apps/negentropy-perceives/
        types_or: [python, pyi]
      - id: perceives-mypy
        name: mypy (negentropy-perceives)
        language: system
        entry: bash -c 'cd apps/negentropy-perceives && uv run mypy src/negentropy/perceives/'
        files: ^apps/negentropy-perceives/
        types_or: [python, pyi]
        pass_filenames: false

  # ── 版本号单一事实源（SSOT）校验 ──────────────────────────────────────────
  # VERSION 文件为唯一权威源，投射到主栈 6 清单（4 package.json + 2 pyproject.toml）。
  # 仅校验不自动修复 —— 版本变更是发布动作，需开发者显式执行：
  #   uv run scripts/sync_versions.py sync
  - repo: local
    hooks:
      - id: version-sync-check
        name: Version SSOT check
        language: system
        entry: uv run scripts/sync_versions.py check
        files: ^(VERSION|scripts/sync_versions\.py|package\.json|apps/negentropy/(pyproject\.toml|uv\.lock)|apps/negentropy-ui/package\.json|apps/negentropy-wiki/package\.json|apps/negentropy-perceives/(pyproject\.toml|uv\.lock)|packages/agents-chat-core/package\.json)$
        pass_filenames: false
